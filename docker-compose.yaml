services:
  db:
    image: mysql:8.0
    container_name: secs-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: warehouse
      MYSQL_USER: secs
      MYSQL_PASSWORD: secs
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build: ./backend
    container_name: secs-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db  # In Docker gebruiken we de servicenaam als host!
      DB_USER: secs
      DB_PASSWORD: secs
      DB_NAME: warehouse
    depends_on:
      - db

  frontend:
    build: ./Frontend/robot-dashboard
    container_name: secs-frontend
    ports:
      - "5173:3000"
    depends_on:
      - backend

volumes:
  db_data: